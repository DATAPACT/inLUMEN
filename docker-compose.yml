name: inlumen

networks:
  datapact_network:
    name: datapact_network

volumes:
  frontend_node_modules:

services:
  neo4j:
    image: neo4j:5-community
    container_name: datapact_neo4j_db
    hostname: datapact-neo4j-db
    mem_limit: 4G
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - ./neo4j_data_volume:/data
      - ./neo4j_logs_volume:/logs
      - ./neo4j_import_volume:/import
      - ./neo4j_plugins_volume:/plugins
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/password}
    healthcheck:
      test:
        - CMD-SHELL
        - 'AUTH_USER="$${NEO4J_AUTH%%/*}"; AUTH_PASS="$${NEO4J_AUTH#*/}"; cypher-shell -u "$$AUTH_USER" -p "$$AUTH_PASS" "RETURN 1;"'
      interval: 5s
      timeout: 5s
      retries: 24
    networks:
      datapact_network:
        aliases:
          - datapact-neo4j-db

  minio:
    image: minio/minio:latest
    container_name: datapact_minio_db
    hostname: datapact-minio-db
    command: server --address 0.0.0.0:9000 --console-address ":9099" /data
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio-datapact}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-datapact}
    ports:
      - "${MINIO_S3_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9099}:9099"
    volumes:
      - ./minio_data:/data
    networks:
      datapact_network:
        aliases:
          - datapact-minio-db

  backend:
    build:
      context: ./backend
    container_name: inlumen_backend
    hostname: inlumen-backend
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      minio:
        condition: service_started
    working_dir: /usr/inlumen
    ports:
      - "${INLUMEN_API_PORT:-5000}:${INLUMEN_API_PORT:-5000}"
    volumes:
      - ./backend:/usr/inlumen
    environment:
      PYTHONUNBUFFERED: "1"
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
      INLUMEN_API_PORT: ${INLUMEN_API_PORT:-5000}
      NEO4J_API_PORT: ${NEO4J_API_PORT:-5001}
      MINIO_API_PORT: ${MINIO_API_PORT:-5003}
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/password}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio-datapact}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-datapact}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL:-}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-}
      WATCH_INTERVAL_SECONDS: ${WATCH_INTERVAL_SECONDS:-1.0}
    command:
      - python
      - dev_runner.py
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.getenv(\"INLUMEN_API_PORT\", \"5000\")}/health', timeout=5)"
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - datapact_network

  frontend:
    build:
      context: ./frontend
    container_name: inlumen_frontend
    hostname: inlumen-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:${FRONTEND_PORT:-8080}"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
      NODE_ENV: development
      VITE_INLUMEN_API_PORT: ${INLUMEN_API_PORT:-5000}
      VITE_AUTH_ENABLED: ${VITE_AUTH_ENABLED:-${AUTH_ENABLED:-false}}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8081}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-inlumen}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-inlumen-frontend}
      VITE_ENABLE_REMOTE_CHATBOT_CONFIG_SYNC: ${VITE_ENABLE_REMOTE_CHATBOT_CONFIG_SYNC:-true}
    command: npm run dev -- --host 0.0.0.0
    networks:
      - datapact_network
