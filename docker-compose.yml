version: '2.4'

networks:
  datapact_network:
    name: datapact_network

services:
  datapact_neo4j_db:
    image: neo4j:5-community
    container_name: datapact_neo4j_db
    hostname: datapact-neo4j-db
    mem_limit: 4G
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j_data_volume:/data
      - ./neo4j_logs_volume:/logs
      - ./neo4j_import_volume:/import
      - ./neo4j_plugins_volume:/plugins
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc","graph-data-science"]
      - NEO4J_dbms.security.procedures.allowlist=apoc.*,gds.*
      - NEO4J_apoc.import.file.enabled=true
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1;"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - datapact_network

  datapact_minio_db:
    image: minio/minio:latest
    container_name: datapact_minio_db
    hostname: datapact-minio-db
    command: server --address 0.0.0.0:9000 --console-address ":9099" /data
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=password
    ports:
      - "9000:9000"
      - "9099:9099"
    volumes:
      - ./minio_data:/data
    networks:
      - datapact_network

  datapact_frontend:
    build: ./frontend
    container_name: datapact_frontend
    hostname: datapact-frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    command: npm run dev -- --host
    networks:
      - datapact_network

  datapact_llm:
    image: ollama/ollama:latest
    container_name: datapact_llm
    hostname: datapact-llm
    networks:
      - datapact_network
    ports:
      - 11434:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    tty: true
    volumes: 
      - ./ollama-volume:/root/.ollama
    restart: unless-stopped

